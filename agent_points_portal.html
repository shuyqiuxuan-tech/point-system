<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agent Points Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Roboto', sans-serif; background: #fff; color: #1F2937; min-height: 100vh; }
    .ap { max-width: 680px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

    .ap-header { text-align: center; margin-bottom: 2rem; padding-bottom: 1.25rem; border-bottom: 2px solid #9B1C1C; }
    .ap-logo-row { display: flex; align-items: center; justify-content: center; gap: 9px; margin-bottom: 4px; }
    .ap-icon-box { width: 36px; height: 36px; background: #9B1C1C; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .ap-icon-box i { color: #fff; font-size: 19px; }
    .ap-h1 { font-size: 22px; font-weight: 700; color: #4A1010; letter-spacing: -0.3px; }
    .ap-sub { font-size: 13px; color: #4B5563; margin-top: 4px; }

    .ap-card { background: #fff; border: 1.5px solid #9B1C1C; border-radius: 12px; padding: 1.25rem; margin-bottom: 1.75rem; }
    .ap-clabel { font-size: 11px; font-weight: 500; color: #7B1A1A; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
    .ap-row { display: flex; gap: 9px; }
    .ap-input { flex: 1; height: 42px; border: 1.5px solid #E5E7EB; border-radius: 8px; padding: 0 13px; font-size: 15px; font-family: 'Roboto', sans-serif; color: #1F2937; outline: none; transition: border-color 0.15s; }
    .ap-input:focus { border-color: #B91C1C; box-shadow: 0 0 0 3px rgba(185,28,28,0.08); }
    .ap-input::placeholder { color: #9CA3AF; }
    .ap-btn { height: 42px; padding: 0 20px; background: #9B1C1C; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; font-family: 'Roboto', sans-serif; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: background 0.15s; }
    .ap-btn:hover { background: #7B1A1A; }
    .ap-btn:active { background: #4A1010; }

    .ap-result { display: none; margin-top: 1rem; }
    .ap-result.show { display: block; }
    .ap-res-inner { background: #FFF5F5; border: 1px solid #FEE2E2; border-radius: 10px; padding: 1.1rem 1.25rem; }
    .ap-res-name { font-size: 18px; font-weight: 700; color: #4A1010; }
    .ap-res-id { font-size: 12px; color: #4B5563; margin-bottom: 0.85rem; }
    .ap-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .ap-stat { background: #fff; border: 1px solid #FEE2E2; border-radius: 8px; padding: 0.7rem 0.85rem; text-align: center; }
    .ap-stat-val { font-size: 26px; font-weight: 700; color: #9B1C1C; line-height: 1.1; }
    .ap-stat-sub { font-size: 11px; color: #6B7280; margin-top: 3px; }
    .ap-stat-lbl { font-size: 10px; color: #4B5563; text-transform: uppercase; letter-spacing: 0.7px; margin-top: 3px; }
    .ap-badge { display: inline-flex; align-items: center; gap: 5px; margin-top: 0.85rem; background: #9B1C1C; color: #fff; font-size: 12px; font-weight: 500; padding: 4px 12px; border-radius: 20px; }
    .ap-notfound { background: #F9FAFB; border: 1px solid #E5E7EB; border-radius: 9px; padding: 0.9rem 1.1rem; font-size: 13px; color: #4B5563; display: flex; align-items: center; gap: 7px; }
    .ap-notin { background: #FFFBEB; border: 1px solid #FDE68A; border-radius: 9px; padding: 0.8rem 1.1rem; font-size: 12px; color: #92400E; display: flex; align-items: center; gap: 6px; margin-top: 0.75rem; }

    .ap-lb-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.85rem; }
    .ap-sec-title { font-size: 11px; font-weight: 500; color: #7B1A1A; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 5px; }
    .ap-lb-note { font-size: 11px; color: #9CA3AF; display: flex; align-items: center; gap: 4px; }

    .ap-table { width: 100%; border-collapse: collapse; border-radius: 10px; overflow: hidden; border: 1px solid #E5E7EB; table-layout: fixed; }
    .ap-table thead tr { background: #9B1C1C; }
    .ap-table thead th { padding: 10px 14px; font-size: 11px; font-weight: 500; color: #fff; text-align: left; text-transform: uppercase; letter-spacing: 0.6px; }
    .ap-table tbody tr { border-bottom: 1px solid #F3F4F6; transition: background 0.1s; }
    .ap-table tbody tr:last-child { border-bottom: none; }
    .ap-table tbody tr:hover { background: #FFF5F5; }
    .ap-table tbody tr.hl { background: #FEF9C3; }
    .ap-table tbody tr.hl:hover { background: #FEF08A; }
    .ap-table tbody td { padding: 11px 14px; font-size: 13px; color: #1F2937; vertical-align: middle; }

    .rank-cell { display: flex; align-items: center; }
    .medal { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
    .m1 { background: #FFD700; color: #7B4F00; }
    .m2 { background: #D1D5DB; color: #374151; }
    .m3 { background: #D97706; color: #451A03; }
    .mn { background: #F3F4F6; color: #4B5563; font-size: 11px; }

    .name-hidden { color: #D1D5DB; font-style: italic; font-size: 12px; user-select: none; }
    .name-vis { font-weight: 700; color: #7B1A1A; }
    .you-tag { font-size: 10px; font-weight: 600; background: #FEE2E2; color: #9B1C1C; padding: 2px 6px; border-radius: 8px; margin-left: 6px; text-transform: uppercase; letter-spacing: 0.4px; }

    .bk-cell { text-align: center; }
    .bk-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .bk-pts-row { display: flex; align-items: center; gap: 6px; }
    .bk-pts { font-size: 15px; font-weight: 700; color: #9B1C1C; }
    .bk-sep { font-size: 13px; color: #D1D5DB; font-weight: 300; }
    .bk-count-row { font-size: 11px; color: #6B7280; }
    .bk-count-row span { font-weight: 500; color: #4B5563; }
    .hl .bk-pts { color: #7B1A1A; }
    .hl .bk-count-row { color: #92400E; }
    .hl .bk-count-row span { color: #7B1A1A; }

    .pts-cell { text-align: right; }
    .bar-pts-wrap { display: flex; align-items: center; justify-content: flex-end; gap: 9px; }
    .bar-bg { width: 60px; height: 6px; background: #F3F4F6; border-radius: 3px; overflow: hidden; flex-shrink: 0; }
    .bar-fill { height: 100%; background: #9B1C1C; border-radius: 3px; }
    .pts-num { font-size: 19px; font-weight: 700; color: #9B1C1C; min-width: 28px; text-align: right; }
    .hl .pts-num { color: #7B1A1A; }
  </style>
</head>
<body>
<div class="ap">

  <div class="ap-header">
    <div class="ap-logo-row">
      <div class="ap-icon-box"><i class="ti ti-trophy"></i></div>
      <div class="ap-h1">Agent Points Portal</div>
    </div>
    <div class="ap-sub">Enter your agent ID to view your points and leaderboard standing</div>
  </div>

  <div class="ap-card">
    <div class="ap-clabel"><i class="ti ti-id-badge"></i> Look up your points</div>
    <div class="ap-row">
      <input class="ap-input" type="text" id="apInput" placeholder="Enter your agent ID (e.g. 1111)" maxlength="10" />
      <button class="ap-btn" onclick="apLookup()">
        <i class="ti ti-search" style="font-size:14px"></i> Check
      </button>
    </div>
    <div class="ap-result" id="apResult"></div>
  </div>

  <div class="ap-lb-hdr">
    <div class="ap-sec-title"><i class="ti ti-chart-bar" style="font-size:14px"></i> Top 10 leaderboard</div>
    <div class="ap-lb-note"><i class="ti ti-eye-off" style="font-size:13px"></i> Names hidden for privacy</div>
  </div>
  <table class="ap-table">
    <thead>
      <tr>
        <th style="width:46px">Rank</th>
        <th style="width:150px">Agent</th>
        <th style="text-align:center">Breakdown</th>
        <th style="width:110px;text-align:right">Total pts</th>
      </tr>
    </thead>
    <tbody id="apLbBody"></tbody>
  </table>

</div>
<script>
  const agents = [
    {id:'1111', name:'Karwai',  boost:3,  bpts:3,  sb:20, sbpts:40, total:43},
    {id:'33333',name:'Agent E', boost:9,  bpts:9,  sb:16, sbpts:32, total:41},
    {id:'2222', name:'Yik Ken', boost:4,  bpts:4,  sb:16, sbpts:32, total:36},
    {id:'3333', name:'Rainier', boost:7,  bpts:7,  sb:12, sbpts:24, total:31},
    {id:'11111',name:'Agent C', boost:2,  bpts:2,  sb:14, sbpts:28, total:30},
    {id:'5555', name:'Adrian',  boost:10, bpts:10, sb:8,  sbpts:16, total:26},
    {id:'8888', name:'Agent F', boost:5,  bpts:5,  sb:10, sbpts:20, total:25},
    {id:'6666', name:'Eza',     boost:11, bpts:11, sb:6,  sbpts:12, total:23},
    {id:'66666',name:'Agent H', boost:3,  bpts:3,  sb:10, sbpts:20, total:23},
    {id:'4444', name:'Nicole',  boost:6,  bpts:6,  sb:8,  sbpts:16, total:22},
    {id:'44444',name:'Agent F2',boost:6,  bpts:6,  sb:8,  sbpts:16, total:22},
    {id:'9999', name:'Agent B', boost:3,  bpts:3,  sb:8,  sbpts:16, total:19},
    {id:'55555',name:'Agent G', boost:2,  bpts:2,  sb:6,  sbpts:12, total:14},
    {id:'7777', name:'Pam',     boost:9,  bpts:9,  sb:2,  sbpts:4,  total:13},
    {id:'77777',name:'Agent I', boost:0,  bpts:0,  sb:6,  sbpts:12, total:12},
    {id:'88888',name:'Agent J', boost:12, bpts:12, sb:0,  sbpts:0,  total:12},
    {id:'22222',name:'Agent D', boost:1,  bpts:1,  sb:4,  sbpts:8,  total:9},
  ];

  const top10 = agents.slice(0, 10);
  const maxPts = top10[0].total;

  function buildLb(hlId) {
    const tb = document.getElementById('apLbBody');
    tb.innerHTML = '';
    top10.forEach((a, i) => {
      const r = i + 1;
      const isHL = hlId && a.id === hlId;
      const mc = r===1?'m1':r===2?'m2':r===3?'m3':'mn';
      const pct = Math.round((a.total / maxPts) * 100);
      const tr = document.createElement('tr');
      if (isHL) tr.className = 'hl';
      const nameCell = isHL
        ? `<span class="name-vis">${a.name}</span><span class="you-tag">you</span>`
        : `<span class="name-hidden">— — — — —</span>`;
      tr.innerHTML = `
        <td><div class="rank-cell"><span class="medal ${mc}">${r}</span></div></td>
        <td>${nameCell}</td>
        <td class="bk-cell">
          <div class="bk-wrap">
            <div class="bk-pts-row">
              <span class="bk-pts">+${a.bpts} pts</span>
              <span class="bk-sep">|</span>
              <span class="bk-pts">+${a.sbpts} pts</span>
            </div>
            <div class="bk-count-row"><span>${a.boost}</span> Boost + <span>${a.sb}</span> SuperBoost</div>
          </div>
        </td>
        <td class="pts-cell">
          <div class="bar-pts-wrap">
            <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
            <span class="pts-num">${a.total}</span>
          </div>
        </td>`;
      tb.appendChild(tr);
    });
  }

  function apLookup() {
    const val = document.getElementById('apInput').value.trim();
    const panel = document.getElementById('apResult');
    const agent = agents.find(a => a.id === val);
    panel.className = 'ap-result show';
    if (!agent) {
      panel.innerHTML = `<div class="ap-notfound"><i class="ti ti-alert-circle" style="color:#B91C1C;font-size:17px"></i> No agent found with ID <strong>${val}</strong>. Please check and try again.</div>`;
      buildLb(null);
      return;
    }
    const rank = agents.findIndex(a => a.id === val) + 1;
    const rl = rank===1?'#1 — Gold':rank===2?'#2 — Silver':rank===3?'#3 — Bronze':`#${rank}`;
    const inTop = rank <= 10;
    panel.innerHTML = `
      <div class="ap-res-inner">
        <div class="ap-res-name">${agent.name}</div>
        <div class="ap-res-id">Agent ID: ${agent.id}</div>
        <div class="ap-stats">
          <div class="ap-stat">
            <div class="ap-stat-val">+${agent.bpts}</div>
            <div class="ap-stat-sub">${agent.boost} Boost</div>
            <div class="ap-stat-lbl">pts earned</div>
          </div>
          <div class="ap-stat">
            <div class="ap-stat-val">+${agent.sbpts}</div>
            <div class="ap-stat-sub">${agent.sb} SuperBoost</div>
            <div class="ap-stat-lbl">pts earned</div>
          </div>
          <div class="ap-stat">
            <div class="ap-stat-val">${agent.total}</div>
            <div class="ap-stat-lbl">Total points</div>
          </div>
        </div>
        <span class="ap-badge"><i class="ti ti-medal" style="font-size:13px"></i> Ranked ${rl}</span>
      </div>
      ${!inTop ? `<div class="ap-notin"><i class="ti ti-info-circle" style="font-size:15px"></i> You are not in the top 10 yet — keep earning points to climb the leaderboard!</div>` : ''}`;
    buildLb(inTop ? agent.id : null);
  }

  document.getElementById('apInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') apLookup();
  });

  buildLb(null);
</script>
</body>
</html>
